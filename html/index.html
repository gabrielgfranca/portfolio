<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">

        <!-- LEFT PANEL -->
        <aside class="profile">
            <h1>Gabriel França</h1>

            <div class="profile-image"></div>
            
            <span class="profile-info"></span>

            <div class="social-media">
                <a href="#">LinkedIn</a>
                <a href="#">GitHub</a>
                <a href="#">YouTube</a>
                <a href="#">Medium</a>
            </div>

            <button class="contact">Contact Me</button>
        </aside>

        <!-- CENTER PANEL -->
        <main class="main">
            <section class="skills card">
                <div class="icon-box">
                    <div class="skills-marquee">
                        <div class="skills-track">
                            <img src="/assets/icons/c.svg">
                            <img src="/assets/icons/java.svg">
                            <img src="/assets/icons/python.svg">
                            <img src="/assets/icons/javascript.svg">
                            <img src="/assets/icons/html5.svg">
                            <img src="/assets/icons/css3.svg">
                            <img src="/assets/icons/c.svg">
                            <img src="/assets/icons/java.svg">
                            <img src="/assets/icons/python.svg">
                            <img src="/assets/icons/javascript.svg">
                            <img src="/assets/icons/html5.svg">
                            <img src="/assets/icons/css3.svg">
                        </div>
                    </div>
                </div>
            </section>

            <section class="portfolio card">
                <h3>Portifolio</h3>
            </section>
        </main>

        <!-- RIGHT PANEL -->
        <aside class="right">
            <section class="softskills card">
                <h3>Soft Skills</h3>
            </section>

            <section class="blog card">
                <h3>My Blog</h3>
            </section>

            <section class="education card">
                <h3>Education</h3>
            </section>
        </aside>
    </div>
</body>

</html>
